name: Deployed Smoke Test

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Base URL for the deployed TMAGen app
        required: true
        default: https://tmagen-web.kristian-jackson.workers.dev

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run deployed smoke flow
        run: npm run smoke:web -- --base-url "${{ inputs.base_url }}"
